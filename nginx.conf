# ==========================================================
# StoicTicket / ticket_system_v3
# Production Nginx config (Windows-compatible syntax)
# ----------------------------------------------------------
# 1) Replace DOMAIN and certificate paths below.
# 2) Ensure Next.js app runs at http://127.0.0.1:3000
# 3) Place this file in C:\nginx\conf\nginx.conf
# 4) Reload: nginx -s reload
# ==========================================================

worker_processes 1;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    # Basic security hardening
    server_tokens off;

    # Helpful for websocket/upgrade handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstream Node/Next.js app
    upstream ticket_system_upstream {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    # ------------------------------------------------------
    # HTTP -> HTTPS redirect
    # ------------------------------------------------------
    server {
        listen 80;
        server_name your-domain.com www.your-domain.com;

        client_max_body_size 20M;
        large_client_header_buffers 4 32k;

        location /.well-known/acme-challenge/ {
            root html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------
    # HTTPS app server
    # ------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # ===== Replace these paths with your cert files =====
        ssl_certificate      C:/nginx/certs/fullchain.pem;
        ssl_certificate_key  C:/nginx/certs/privkey.pem;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Reasonable security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 20M;
        large_client_header_buffers 4 32k;

        # Next.js static assets: long cache, immutable
        location /_next/static/ {
            proxy_pass http://ticket_system_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Main app proxy
        location / {
            proxy_pass http://ticket_system_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 60s;
        }
    }
}
